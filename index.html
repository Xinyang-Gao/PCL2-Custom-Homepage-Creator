<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PCL 主页编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo"><i class="fas fa-cube"></i> PCL 主页编辑器</div>
        <button class="theme-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>
    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">组件库 <i class="fas fa-grip-vertical"></i></div>
            <div class="search-box"><input type="text" id="compSearch" placeholder="搜索组件..."></div>
            <div class="components-list" id="componentsList"></div>
        </div>
        <div class="design-area">
            <div class="toolbar">
                <button class="btn" id="clearCanvasBtn"><i class="fas fa-trash"></i> 清空</button>
                <button class="btn btn-primary" id="xamlExportBtn"><i class="fas fa-code"></i> XAML工具</button>
                <button class="btn" id="toggleSidebarBtn"><i class="fas fa-bars"></i> 组件库</button>
                <button class="btn" id="togglePropsPanelBtn" style="display: none;"><i class="fas fa-sliders-h"></i> 属性</button>
            </div>
            <div class="hierarchy-bar" id="hierarchyBar"></div>
            <div class="preview-container" id="previewContainer">
                <div class="canvas" id="canvas"></div>
            </div>
        </div>

        <!-- 重构后的属性面板 -->
        <div class="props-panel" id="propsPanel">
            <div class="props-info-header" id="propsInfoHeader">
                <div class="comp-type-badge" id="compTypeBadge">
                    <i class="fas fa-puzzle-piece"></i> <span id="compTypeName">未选中</span>
                </div>
                <div class="comp-id-row">
                    <span class="id-label">ID</span>
                    <code id="compIdDisplay">-</code>
                    <button class="id-copy-btn" id="copyIdBtn" title="复制ID"><i class="far fa-copy"></i></button>
                </div>
            </div>
            <div id="dynamicProps" class="props-groups-container"></div>
            <div class="prop-section">
                <div class="prop-section-title">
                    <i class="fas fa-bolt"></i> 事件绑定
                </div>
                <div class="prop-field">
                    <label>EventType</label>
                    <select id="eventTypeSelect">
                        <option value="">无</option>
                        <option value="打开网页">打开网页</option>
                        <option value="启动游戏">启动游戏</option>
                        <option value="弹出窗口">弹出窗口</option>
                        <option value="复制文本">复制文本</option>
                        <option value="打开文件">打开文件</option>
                        <option value="内存优化">内存优化</option>
                        <option value="下载文件">下载文件</option>
                        <option value="清理垃圾">清理垃圾</option>
                        <option value="打开帮助">打开帮助</option>
                        <option value="修改变量">修改变量</option>
                        <option value="刷新页面">刷新页面</option>
                    </select>
                </div>
                <div class="prop-field">
                    <label>EventData</label>
                    <textarea id="eventDataInput" rows="2" placeholder="事件数据，例如网址、弹窗内容（标题|内容）等"></textarea>
                </div>
            </div>
            <div class="prop-actions">
                <button class="btn btn-primary" id="applyPropsBtn"><i class="fas fa-check"></i> 应用更改</button>
                <button class="btn btn-danger" id="deleteCompBtn"><i class="fas fa-trash-alt"></i> 删除组件</button>
                <button class="btn" id="duplicateCompBtn"><i class="fas fa-copy"></i> 复制组件</button>
            </div>
        </div>
    </div>
</div>

<!-- XAML工具弹窗（增强：下载文件） -->
<div class="modal" id="xamlModal">
    <div class="modal-content">
        <h3><i class="fas fa-code"></i> XAML 工具</h3>
        <div style="margin: 12px 0;">
            <button class="btn" id="viewXamlBtn"><i class="fas fa-eye"></i> 查看XAML</button>
            <button class="btn" id="importXamlBtn"><i class="fas fa-upload"></i> 导入XAML</button>
        </div>
        <div id="xamlViewArea" style="display:none;">
            <textarea id="xamlCodeArea" class="code-editor" readonly></textarea>
            <div class="modal-actions">
                <button class="btn" id="copyXamlBtn"><i class="fas fa-copy"></i> 复制代码</button>
                <button class="btn btn-primary" id="downloadXamlBtn"><i class="fas fa-download"></i> 下载为XAML文件</button>
                <button class="btn" id="closeModalBtn"><i class="fas fa-times"></i> 关闭</button>
            </div>
        </div>
        <div id="importArea" style="display:none;">
            <textarea id="importXamlText" class="code-editor" placeholder="粘贴 XAML 代码..."></textarea>
            <div style="margin-top:12px;">
                <button class="btn btn-primary" id="doImportBtn"><i class="fas fa-code-branch"></i> 解析并加载</button>
                <button class="btn" id="cancelImportBtn"><i class="fas fa-times"></i> 取消</button>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>
<!-- 全局拖拽视觉层 -->
<div class="global-drag-overlay" id="globalDragOverlay">
    <i class="fas fa-file-import"></i> 释放文件以导入 XAML
</div>

<script src="/script.js"></script>
</body>
</html>
