<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PCL 自定义主页编辑器 - 可视化设计XAML (稳定拖拽版)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg-light: #f9fafb;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --text: #1f2937;
            --text-light: #6b7280;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 12px;
        }

        body.dark {
            --bg-light: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-light: #94a3b8;
        }

        body {
            background: var(--bg-light);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .logo i {
            color: var(--primary);
            font-size: 1.6rem;
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text);
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .theme-btn:hover {
            background: var(--border);
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.2s;
            z-index: 20;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-light);
            color: var(--text);
        }

        .components-list {
            padding: 16px;
            flex: 1;
        }

        .comp-category {
            margin-bottom: 24px;
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .comp-item {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: grab;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            user-select: none;
        }

        .comp-item:active {
            cursor: grabbing;
        }

        .comp-item:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
            transform: translateX(2px);
        }

        .comp-item i:first-child {
            width: 24px;
            color: var(--primary);
        }

        .design-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 12px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            background: var(--bg-light);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn:hover {
            filter: brightness(0.95);
        }

        .hierarchy-bar {
            background: var(--bg-light);
            padding: 8px 20px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }

        .hierarchy-item {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .preview-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg-light);
        }

        .canvas {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
        }

        .card-component {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
            position: relative;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 12px 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .card-content {
            padding: 16px;
        }

        .nested-dropzone {
            min-height: 60px;
            border: 2px dashed transparent;
            transition: border 0.2s, background 0.2s;
            border-radius: 8px;
            padding: 4px;
        }

        .nested-dropzone.drag-over {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.08);
        }

        .component-item-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .selected {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 8px;
        }

        .props-panel {
            width: 300px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.2s;
            z-index: 20;
        }

        .prop-group {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .prop-group h4 {
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prop-field {
            margin-bottom: 12px;
        }

        .prop-field label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 4px;
            color: var(--text-light);
        }

        .prop-field input, .prop-field select, .prop-field textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-light);
            color: var(--text);
        }

        button.small {
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        .hint-blue { background: #e0f2fe; border-left: 4px solid #0284c7; padding: 10px; border-radius: 8px; }
        .hint-yellow { background: #fef9c3; border-left: 4px solid #eab308; }
        .hint-red { background: #fee2e2; border-left: 4px solid #dc2626; }

        .list-item-mock {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-card);
            width: 700px;
            max-width: 90%;
            border-radius: 16px;
            padding: 20px;
            max-height: 80vh;
            overflow: auto;
        }
        .code-editor {
            font-family: monospace;
            width: 100%;
            height: 400px;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 12px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        @media (max-width: 800px) {
            .sidebar, .props-panel { position: absolute; top: 0; bottom: 0; background: var(--bg-card); transform: translateX(-100%); }
            .props-panel { right: 0; transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .props-panel.open { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo"><i class="fas fa-cube"></i> PCL 主页编辑器</div>
        <button class="theme-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>
    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">组件库 <i class="fas fa-grip-vertical"></i></div>
            <div class="search-box"><input type="text" id="compSearch" placeholder="搜索组件..."></div>
            <div class="components-list" id="componentsList"></div>
        </div>
        <div class="design-area">
            <div class="toolbar">
                <button class="btn" id="clearCanvasBtn"><i class="fas fa-trash"></i> 清空</button>
                <button class="btn btn-primary" id="xamlExportBtn"><i class="fas fa-code"></i> XAML工具</button>
                <button class="btn" id="toggleSidebarBtn"><i class="fas fa-bars"></i> 组件库</button>
            </div>
            <div class="hierarchy-bar" id="hierarchyBar"></div>
            <div class="preview-container" id="previewContainer">
                <div class="canvas" id="canvas"></div>
            </div>
        </div>
        <div class="props-panel" id="propsPanel">
            <div class="prop-group"><h4><i class="fas fa-info-circle"></i> 组件属性</h4>
                <div class="prop-field"><label>类型</label><input id="propType" disabled></div>
                <div class="prop-field"><label>ID</label><input id="propId" disabled></div>
            </div>
            <div id="dynamicProps"></div>
            <div class="prop-group"><h4><i class="fas fa-bolt"></i> 事件 (Event)</h4>
                <div class="prop-field"><label>EventType</label><select id="eventTypeSelect"><option value="">无</option><option value="打开网页">打开网页</option><option value="启动游戏">启动游戏</option><option value="弹出窗口">弹出窗口</option><option value="复制文本">复制文本</option><option value="打开文件">打开文件</option></select></div>
                <div class="prop-field"><label>EventData</label><textarea id="eventDataInput" rows="2"></textarea></div>
            </div>
            <div class="prop-group"><div style="display:flex; gap:8px;"><button class="btn btn-primary" id="applyPropsBtn">应用更改</button><button class="btn btn-danger" id="deleteCompBtn">删除组件</button><button class="btn" id="duplicateCompBtn">复制组件</button></div></div>
        </div>
    </div>
</div>
<div class="modal" id="xamlModal"><div class="modal-content"><h3>XAML 工具</h3><div style="margin: 12px 0;"><button class="btn" id="viewXamlBtn">查看XAML</button><button class="btn" id="importXamlBtn">导入XAML</button></div><div id="xamlViewArea" style="display:none;"><textarea id="xamlCodeArea" class="code-editor" readonly></textarea><div style="margin-top:12px;"><button class="btn" id="copyXamlBtn">复制代码</button><button class="btn" id="closeModalBtn">关闭</button></div></div><div id="importArea" style="display:none;"><textarea id="importXamlText" class="code-editor" placeholder="粘贴 XAML 代码..."></textarea><div style="margin-top:12px;"><button class="btn btn-primary" id="doImportBtn">解析并加载</button><button class="btn" id="cancelImportBtn">取消</button></div></div></div></div>
<div id="toast" class="toast"></div>
<script>
    // ---------- 组件元数据 ----------
    const COMP_TYPES = {
        card: { name: "卡片 (MyCard)", icon: "fas fa-layer-group", canNest: true, defaults: { Title: "新卡片", Margin: "0,0,0,15", CanSwap: "True", IsSwapped: "True" } },
        text: { name: "文本 (TextBlock)", icon: "fas fa-font", canNest: false, defaults: { Text: "这是一段文本", FontSize: "14", TextWrapping: "Wrap", Foreground: "#1e293b" } },
        hint: { name: "提示条 (MyHint)", icon: "fas fa-info-circle", canNest: false, defaults: { Text: "提示信息", Theme: "Blue" } },
        image: { name: "图片 (MyImage)", icon: "fas fa-image", canNest: false, defaults: { Source: "https://www.baidu.com/img/flexible/logo/pc/result.png", Height: "60", HorizontalAlignment: "Center" } },
        button: { name: "按钮 (MyButton)", icon: "fas fa-hand-pointer", canNest: false, defaults: { Text: "按钮", ColorType: "Highlight", Height: "35", Padding: "20,0", Margin: "0,4,0,10" } },
        textbutton: { name: "文本按钮 (MyTextButton)", icon: "fas fa-minus-square", canNest: false, defaults: { Text: "文本按钮", Margin: "0,8,0,10" } },
        listitem: { name: "列表项 (MyListItem)", icon: "fas fa-list", canNest: false, defaults: { Title: "标题", Info: "描述", Logo: "pack://application:,,,/images/Blocks/Grass.png", Type: "Clickable" } },
        stackpanel: { name: "垂直布局 (StackPanel)", icon: "fas fa-align-justify", canNest: true, defaults: { Margin: "0,0,0,0" } },
        horizontalstack: { name: "水平布局 (StackPanel Horizontal)", icon: "fas fa-arrows-alt-h", canNest: true, defaults: { Orientation: "Horizontal", HorizontalAlignment: "Center", Margin: "0,0,0,0" } }
    };
    
    let state = { components: [], nextId: 100, selectedId: null };
    let pendingDragType = null;   // 临时存储正在拖拽的组件类型
    
    // 辅助函数
    function showToast(msg, isErr = false) { 
        let t = document.getElementById('toast'); 
        t.textContent = msg; 
        t.style.background = isErr ? '#ef4444' : '#4f46e5'; 
        t.style.opacity = '1'; 
        setTimeout(() => t.style.opacity = '0', 2000); 
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function escapeXml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function findCompById(id, list = state.components) {
        for (let c of list) { if (c.id === id) return c; if (c.children) { let found = findCompById(id, c.children); if (found) return found; } }
        return null;
    }
    
    function createComponent(type, parentId = null) {
        const def = COMP_TYPES[type];
        if (!def) return null;
        const id = state.nextId++;
        const comp = { id, type, name: def.name, parentId, children: [], props: JSON.parse(JSON.stringify(def.defaults)), events: { type: "", data: "" } };
        return comp;
    }
    
    function addComponent(comp, targetParentId = null) {
        if (targetParentId === null) { 
            state.components.push(comp); 
            return true; 
        }
        const parent = findCompById(targetParentId);
        if (parent && COMP_TYPES[parent.type]?.canNest) { 
            parent.children.push(comp); 
            comp.parentId = targetParentId; 
            return true; 
        }
        return false;
    }
    
    function removeCompById(id) {
        const removeFromList = (list) => { 
            for (let i=0; i<list.length; i++) { 
                if (list[i].id === id) { list.splice(i,1); return true; } 
                if (list[i].children && removeFromList(list[i].children)) return true; 
            } return false; 
        };
        if (removeFromList(state.components)) { 
            if (state.selectedId === id) state.selectedId = null; 
            renderCanvas(); 
            return true; 
        }
        return false;
    }
    
    // ---------- 渲染核心 ----------
    function renderComponent(comp, container) {
        const wrapper = document.createElement('div');
        wrapper.className = 'component-item-wrapper';
        wrapper.setAttribute('data-id', comp.id);
        wrapper.setAttribute('data-type', comp.type);
        
        if (comp.type === 'card') {
            wrapper.innerHTML = `<div class="card-component"><div class="card-header"><span>${escapeHtml(comp.props.Title || '卡片')}</span><div><i class="fas fa-arrows-alt"></i></div></div><div class="card-content"><div class="nested-dropzone" data-parent-id="${comp.id}" data-placeholder="将组件拖入卡片"></div></div></div>`;
            const dropzone = wrapper.querySelector('.nested-dropzone');
            comp.children.forEach(child => renderComponent(child, dropzone));
        } 
        else if (comp.type === 'stackpanel') {
            wrapper.innerHTML = `<div class="card-component" style="background:var(--bg-card); padding:8px; border:1px dashed var(--border);"><div style="font-size:0.7rem; color:var(--text-light);"><i class="fas fa-layer-group"></i> 垂直布局</div><div class="nested-dropzone" data-parent-id="${comp.id}"></div></div>`;
            const dz = wrapper.querySelector('.nested-dropzone');
            comp.children.forEach(child => renderComponent(child, dz));
        }
        else if (comp.type === 'horizontalstack') {
            wrapper.innerHTML = `<div class="card-component" style="background:var(--bg-card); padding:8px; border:1px dashed var(--border);"><div style="font-size:0.7rem;"><i class="fas fa-arrows-alt-h"></i> 水平布局</div><div class="nested-dropzone horizontal" data-parent-id="${comp.id}" style="display:flex; gap:8px; flex-wrap:wrap;"></div></div>`;
            const dz = wrapper.querySelector('.nested-dropzone');
            comp.children.forEach(child => renderComponent(child, dz));
        }
        else {
            let innerHtml = '';
            if (comp.type === 'text') innerHtml = `<div style="margin:4px 0; color:${comp.props.Foreground || '#000'}">${escapeHtml(comp.props.Text || '文本')}</div>`;
            else if (comp.type === 'hint') innerHtml = `<div class="hint-${(comp.props.Theme||'blue').toLowerCase()}" style="padding:8px; border-radius:8px;">${escapeHtml(comp.props.Text)}</div>`;
            else if (comp.type === 'image') innerHtml = `<img src="${comp.props.Source}" style="max-width:100%; height:${comp.props.Height || 'auto'}" />`;
            else if (comp.type === 'button') innerHtml = `<button class="btn" style="background:${comp.props.ColorType === 'Highlight' ? '#4f46e5' : '#333'}; color:white; border:none; padding:8px 16px; border-radius:30px;">${escapeHtml(comp.props.Text)}</button>`;
            else if (comp.type === 'textbutton') innerHtml = `<button style="background:none; border:none; color:var(--primary); cursor:pointer;">${escapeHtml(comp.props.Text)}</button>`;
            else if (comp.type === 'listitem') innerHtml = `<div class="list-item-mock"><i class="fas fa-cube"></i><div><strong>${escapeHtml(comp.props.Title)}</strong><div style="font-size:12px;">${escapeHtml(comp.props.Info)}</div></div></div>`;
            wrapper.innerHTML = innerHtml;
        }
        wrapper.addEventListener('click', (e) => { e.stopPropagation(); selectComponent(comp.id); });
        container.appendChild(wrapper);
    }
    
    function renderCanvas() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';
        if (state.components.length === 0) { 
            canvas.innerHTML = '<div class="empty-placeholder"><i class="fas fa-drag-drop" style="font-size:2rem"></i><p>从左侧拖拽组件至此</p></div>'; 
            return; 
        }
        state.components.forEach(comp => renderComponent(comp, canvas));
        // 高亮当前选中的组件
        if (state.selectedId) { 
            document.querySelectorAll(`[data-id="${state.selectedId}"]`).forEach(el => el.classList.add('selected')); 
        }
        updateHierarchyBar();
        updatePropsPanel();
    }
    
    function selectComponent(id) {
        state.selectedId = id;
        document.querySelectorAll('.component-item-wrapper').forEach(el => el.classList.remove('selected'));
        const selEl = document.querySelector(`[data-id="${id}"]`);
        if (selEl) selEl.classList.add('selected');
        updatePropsPanel();
        updateHierarchyBar();
    }
    
    function updatePropsPanel() {
        const comp = findCompById(state.selectedId);
        if (!comp) { 
            document.getElementById('propType').value = ''; 
            document.getElementById('dynamicProps').innerHTML = ''; 
            return; 
        }
        document.getElementById('propType').value = COMP_TYPES[comp.type]?.name || comp.type;
        document.getElementById('propId').value = comp.id;
        const eventTypeSel = document.getElementById('eventTypeSelect');
        const eventDataInp = document.getElementById('eventDataInput');
        eventTypeSel.value = comp.events?.type || '';
        eventDataInp.value = comp.events?.data || '';
        const container = document.getElementById('dynamicProps');
        container.innerHTML = '';
        for (let [key, val] of Object.entries(comp.props)) {
            const div = document.createElement('div'); div.className = 'prop-field';
            div.innerHTML = `<label>${key}</label><input data-prop="${key}" value="${escapeHtml(String(val))}" />`;
            container.appendChild(div);
        }
    }
    
    function applyCurrentProps() {
        const comp = findCompById(state.selectedId);
        if (!comp) return;
        document.querySelectorAll('#dynamicProps input').forEach(inp => {
            let key = inp.getAttribute('data-prop');
            if (key) comp.props[key] = inp.value;
        });
        comp.events = { type: document.getElementById('eventTypeSelect').value, data: document.getElementById('eventDataInput').value };
        renderCanvas();
        showToast('属性已更新');
    }
    
    function updateHierarchyBar() {
        const bar = document.getElementById('hierarchyBar');
        if (!state.selectedId) { bar.innerHTML = '<span>未选中组件</span>'; return; }
        let path = [];
        let cur = findCompById(state.selectedId);
        while (cur) { path.unshift(cur); cur = findCompById(cur.parentId); }
        bar.innerHTML = path.map(c => `<span class="hierarchy-item" data-id="${c.id}">${c.name}</span>`).join(' <i class="fas fa-chevron-right"></i> ');
        document.querySelectorAll('.hierarchy-item').forEach(el => el.addEventListener('click', (e) => { selectComponent(parseInt(el.getAttribute('data-id'))); }));
    }
    
    // ---------- 全新拖拽逻辑 (无重复放置) ----------
    function initDragAndDrop() {
        // 组件库拖拽源: 在build时绑定dragstart
        // 全局放置监听 (使用事件委托，避免重复绑定)
        const designContainer = document.getElementById('previewContainer');
        
        // 全局 dragover 必须阻止默认以允许放置
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });
        
        // 高亮管理: 记录当前悬停的dropzone
        let currentDragOverElement = null;
        
        // 全局 dragover 用于动态添加高亮
        designContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            // 寻找实际有效的放置区域
            const targetZone = e.target.closest('.nested-dropzone, .canvas');
            if (targetZone && targetZone !== currentDragOverElement) {
                // 移除之前的悬停样式
                if (currentDragOverElement) currentDragOverElement.classList.remove('drag-over');
                currentDragOverElement = targetZone;
                targetZone.classList.add('drag-over');
            } else if (!targetZone && currentDragOverElement) {
                currentDragOverElement.classList.remove('drag-over');
                currentDragOverElement = null;
            }
        });
        
        // 全局 dragleave 清除高亮
        designContainer.addEventListener('dragleave', (e) => {
            if (currentDragOverElement) {
                currentDragOverElement.classList.remove('drag-over');
                currentDragOverElement = null;
            }
        });
        
        // 关键: drop 事件处理，只添加一次组件
        designContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            // 清除高亮
            if (currentDragOverElement) {
                currentDragOverElement.classList.remove('drag-over');
                currentDragOverElement = null;
            }
            
            // 获取拖拽的类型
            let compType = pendingDragType;
            if (!compType) {
                // 兼容从外部或者dataTransfer读取
                const dragData = e.dataTransfer.getData('text/plain');
                if (dragData && COMP_TYPES[dragData]) compType = dragData;
            }
            if (!compType || !COMP_TYPES[compType]) {
                // 可能拖拽的不是有效组件
                return;
            }
            
            // 确定放置目标父容器ID
            let targetParentId = null;
            const dropZone = e.target.closest('.nested-dropzone, .canvas');
            if (!dropZone) return;
            
            if (dropZone.classList.contains('nested-dropzone')) {
                const parentIdAttr = dropZone.getAttribute('data-parent-id');
                if (parentIdAttr) targetParentId = parseInt(parentIdAttr);
            } else if (dropZone.classList.contains('canvas')) {
                targetParentId = null; // 根容器
            }
            
            // 验证是否可以放置 (父容器是否支持嵌套)
            if (targetParentId !== null) {
                const parentComp = findCompById(targetParentId);
                if (!parentComp || !COMP_TYPES[parentComp.type]?.canNest) {
                    showToast('该容器不允许放置子组件', true);
                    return;
                }
            }
            
            // 创建新组件
            const newComp = createComponent(compType, targetParentId);
            if (!newComp) return;
            
            const success = addComponent(newComp, targetParentId);
            if (success) {
                renderCanvas();
                showToast(`添加 ${COMP_TYPES[compType].name}`);
                // 可选: 自动选中新组件
                selectComponent(newComp.id);
            } else {
                showToast('无法添加到此处', true);
            }
            
            // 清理拖拽数据，避免重复添加
            pendingDragType = null;
        });
        
        // 拖拽结束清理全局标志
        document.addEventListener('dragend', () => {
            pendingDragType = null;
            if (currentDragOverElement) {
                currentDragOverElement.classList.remove('drag-over');
                currentDragOverElement = null;
            }
        });
    }
    
    // 构建组件库，并绑定dragstart
    function buildComponentLib() {
        const container = document.getElementById('componentsList');
        container.innerHTML = '';
        for (let [key, val] of Object.entries(COMP_TYPES)) {
            const div = document.createElement('div'); 
            div.className = 'comp-item'; 
            div.setAttribute('data-type', key); 
            div.setAttribute('draggable', 'true');
            div.innerHTML = `<i class="${val.icon}"></i><span>${val.name}</span><i class="fas fa-grip-vertical" style="margin-left:auto; opacity:0.5"></i>`;
            // dragstart 设置拖拽类型和数据
            div.addEventListener('dragstart', (e) => {
                pendingDragType = key;
                e.dataTransfer.setData('text/plain', key);
                e.dataTransfer.effectAllowed = 'copy';
                // 可选：设置拖拽图标
                if (e.target.closest) {
                    let dragIcon = document.createElement('div');
                    dragIcon.textContent = val.name;
                    e.dataTransfer.setDragImage(dragIcon, 10, 10);
                }
            });
            div.addEventListener('dragend', () => {
                // 确保清理，避免残留
                pendingDragType = null;
            });
            container.appendChild(div);
        }
    }
    
    // ---------- XAML 导入导出 (保持不变, 略作优化)----------
    function generateXAML(comps, indent = 0) {
        let xaml = '';
        for (let comp of comps) {
            let spaces = '  '.repeat(indent);
            if (comp.type === 'card') {
                let margin = comp.props.Margin || '0,0,0,15';
                let canSwap = comp.props.CanSwap || 'True';
                let isSwapped = comp.props.IsSwapped || 'True';
                xaml += `${spaces}<local:MyCard Title="${escapeXml(comp.props.Title)}" Margin="${margin}" CanSwap="${canSwap}" IsSwapped="${isSwapped}">\n`;
                xaml += `${spaces}  <StackPanel Margin="25,40,23,15">\n`;
                for (let child of comp.children) xaml += generateXAML([child], indent + 2);
                xaml += `${spaces}  </StackPanel>\n${spaces}</local:MyCard>\n\n`;
            } else if (comp.type === 'text') {
                let fore = comp.props.Foreground ? ` Foreground="${comp.props.Foreground}"` : '';
                xaml += `${spaces}  <TextBlock TextWrapping="${comp.props.TextWrapping || 'Wrap'}" FontSize="${comp.props.FontSize || '14'}"${fore} Text="${escapeXml(comp.props.Text)}" />\n`;
            } else if (comp.type === 'hint') {
                xaml += `${spaces}  <local:MyHint Text="${escapeXml(comp.props.Text)}" Theme="${comp.props.Theme || 'Blue'}" />\n`;
            } else if (comp.type === 'image') {
                xaml += `${spaces}  <local:MyImage Height="${comp.props.Height || '60'}" HorizontalAlignment="${comp.props.HorizontalAlignment || 'Center'}" Source="${escapeXml(comp.props.Source)}" />\n`;
            } else if (comp.type === 'button') {
                let evt = comp.events?.type ? ` EventType="${comp.events.type}" EventData="${escapeXml(comp.events.data || '')}"` : '';
                xaml += `${spaces}  <local:MyButton Margin="${comp.props.Margin || '0,4,0,10'}" Height="${comp.props.Height || '35'}" Padding="${comp.props.Padding || '20,0'}" ColorType="${comp.props.ColorType || 'Highlight'}" Text="${escapeXml(comp.props.Text)}"${evt} />\n`;
            } else if (comp.type === 'textbutton') {
                let evt = comp.events?.type ? ` EventType="${comp.events.type}" EventData="${escapeXml(comp.events.data || '')}"` : '';
                xaml += `${spaces}  <local:MyTextButton Margin="${comp.props.Margin || '0,8,0,10'}" HorizontalAlignment="Center" Text="${escapeXml(comp.props.Text)}"${evt} />\n`;
            } else if (comp.type === 'listitem') {
                let evt = comp.events?.type ? ` EventType="${comp.events.type}" EventData="${escapeXml(comp.events.data || '')}"` : '';
                xaml += `${spaces}  <local:MyListItem Margin="-5,0,-5,8" Logo="${escapeXml(comp.props.Logo)}" Title="${escapeXml(comp.props.Title)}" Info="${escapeXml(comp.props.Info)}" Type="Clickable"${evt} />\n`;
            } else if (comp.type === 'stackpanel') {
                xaml += `${spaces}  <StackPanel Margin="${comp.props.Margin || '0'}">\n`;
                for (let c of comp.children) xaml += generateXAML([c], indent + 2);
                xaml += `${spaces}  </StackPanel>\n`;
            } else if (comp.type === 'horizontalstack') {
                xaml += `${spaces}  <StackPanel Orientation="Horizontal" HorizontalAlignment="Center" Margin="${comp.props.Margin || '0'}">\n`;
                for (let c of comp.children) xaml += generateXAML([c], indent + 2);
                xaml += `${spaces}  </StackPanel>\n`;
            }
        }
        return xaml;
    }
    
    function importFromXAML(xmlStr) {
        try {
            const parser = new DOMParser();
            const xml = parser.parseFromString(`<root>${xmlStr}</root>`, 'text/xml');
            if (xml.querySelector('parsererror')) throw new Error('XML格式错误');
            function parseNode(node, parentId = null) {
                let tag = node.tagName?.toLowerCase();
                if (!tag) return null;
                if (tag.includes('mycard')) {
                    let comp = createComponent('card', parentId);
                    comp.props.Title = node.getAttribute('Title') || '卡片';
                    comp.props.Margin = node.getAttribute('Margin') || '0,0,0,15';
                    comp.props.CanSwap = node.getAttribute('CanSwap') || 'True';
                    comp.props.IsSwapped = node.getAttribute('IsSwapped') || 'True';
                    let stack = node.querySelector('stackpanel');
                    if (stack) {
                        for (let child of stack.children) { let childComp = parseNode(child, comp.id); if (childComp) comp.children.push(childComp); }
                    }
                    return comp;
                } else if (tag.includes('textblock')) {
                    let comp = createComponent('text', parentId);
                    comp.props.Text = node.getAttribute('Text') || '文本';
                    comp.props.FontSize = node.getAttribute('FontSize') || '14';
                    comp.props.Foreground = node.getAttribute('Foreground') || '#1e293b';
                    return comp;
                } else if (tag.includes('myhint')) {
                    let comp = createComponent('hint', parentId);
                    comp.props.Text = node.getAttribute('Text') || '提示';
                    comp.props.Theme = node.getAttribute('Theme') || 'Blue';
                    return comp;
                } else if (tag.includes('myimage')) {
                    let comp = createComponent('image', parentId);
                    comp.props.Source = node.getAttribute('Source') || '';
                    comp.props.Height = node.getAttribute('Height') || '60';
                    return comp;
                } else if (tag.includes('mybutton')) {
                    let comp = createComponent('button', parentId);
                    comp.props.Text = node.getAttribute('Text') || '按钮';
                    comp.props.ColorType = node.getAttribute('ColorType') || 'Highlight';
                    comp.events = { type: node.getAttribute('EventType') || '', data: node.getAttribute('EventData') || '' };
                    return comp;
                } else if (tag.includes('mytextbutton')) {
                    let comp = createComponent('textbutton', parentId);
                    comp.props.Text = node.getAttribute('Text') || '文本按钮';
                    comp.events = { type: node.getAttribute('EventType') || '', data: node.getAttribute('EventData') || '' };
                    return comp;
                } else if (tag.includes('mylistitem')) {
                    let comp = createComponent('listitem', parentId);
                    comp.props.Title = node.getAttribute('Title') || '';
                    comp.props.Info = node.getAttribute('Info') || '';
                    comp.props.Logo = node.getAttribute('Logo') || '';
                    comp.events = { type: node.getAttribute('EventType') || '', data: node.getAttribute('EventData') || '' };
                    return comp;
                } else if (tag === 'stackpanel' && node.getAttribute('orientation') !== 'Horizontal') {
                    let comp = createComponent('stackpanel', parentId);
                    for (let child of node.children) { let c = parseNode(child, comp.id); if (c) comp.children.push(c); }
                    return comp;
                } else if (tag === 'stackpanel' && node.getAttribute('orientation') === 'Horizontal') {
                    let comp = createComponent('horizontalstack', parentId);
                    for (let child of node.children) { let c = parseNode(child, comp.id); if (c) comp.children.push(c); }
                    return comp;
                }
                return null;
            }
            let newComponents = [];
            for (let node of xml.documentElement.children) {
                let comp = parseNode(node);
                if (comp) newComponents.push(comp);
            }
            if (newComponents.length) { state.components = newComponents; state.nextId = Math.max(200, ...newComponents.map(c=>c.id)) + 1; state.selectedId = null; renderCanvas(); showToast('导入成功'); }
            else showToast('未找到有效组件', true);
        } catch(e) { showToast('解析失败: '+e.message, true); }
    }
    
    // ---------- 事件绑定 & 初始化 ----------
    document.getElementById('clearCanvasBtn').onclick = () => { if(confirm('清空所有组件？')){ state.components = []; state.selectedId = null; renderCanvas(); } };
    document.getElementById('applyPropsBtn').onclick = () => applyCurrentProps();
    document.getElementById('deleteCompBtn').onclick = () => { if(state.selectedId && confirm('删除组件？')) { removeCompById(state.selectedId); state.selectedId = null; renderCanvas(); } };
    document.getElementById('duplicateCompBtn').onclick = () => { if(state.selectedId){ let original = findCompById(state.selectedId); if(original){ let copy = JSON.parse(JSON.stringify(original)); copy.id = state.nextId++; copy.name = copy.name+' 副本'; copy.parentId = null; copy.children = []; if(original.parentId){ let parent = findCompById(original.parentId); if(parent) parent.children.push(copy); } else state.components.push(copy); renderCanvas(); showToast('已复制'); } } };
    document.getElementById('xamlExportBtn').onclick = () => { document.getElementById('xamlModal').style.display = 'flex'; document.getElementById('xamlViewArea').style.display = 'block'; document.getElementById('importArea').style.display = 'none'; document.getElementById('xamlCodeArea').value = generateXAML(state.components); };
    document.getElementById('viewXamlBtn').onclick = () => { document.getElementById('xamlViewArea').style.display = 'block'; document.getElementById('importArea').style.display = 'none'; document.getElementById('xamlCodeArea').value = generateXAML(state.components); };
    document.getElementById('importXamlBtn').onclick = () => { document.getElementById('xamlViewArea').style.display = 'none'; document.getElementById('importArea').style.display = 'block'; document.getElementById('importXamlText').value = ''; };
    document.getElementById('doImportBtn').onclick = () => { let code = document.getElementById('importXamlText').value; if(code.trim()) importFromXAML(code); document.getElementById('xamlModal').style.display = 'none'; };
    document.getElementById('copyXamlBtn').onclick = () => { let text = document.getElementById('xamlCodeArea'); text.select(); document.execCommand('copy'); showToast('已复制XAML'); };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('xamlModal').style.display = 'none';
    document.getElementById('cancelImportBtn').onclick = () => document.getElementById('xamlModal').style.display = 'none';
    document.getElementById('toggleSidebarBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('themeToggle').onclick = () => { document.body.classList.toggle('dark'); };
    window.onclick = (e) => { if(e.target === document.getElementById('xamlModal')) document.getElementById('xamlModal').style.display = 'none'; };
    
    // 启动
    buildComponentLib();
    initDragAndDrop();   // 全新拖拽系统，无重复添加
    renderCanvas();
</script>
